<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sport radar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030712">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.2);
            --drop: #ef4444; 
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --soccer-color: #3b82f6;
            --basket-color: #f97316;
            --handball-color: #a855f7;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 440px; }

        header { 
            text-align: center; 
            margin-top: 10px;
            margin-bottom: 25px; 
        }
        
        header h1 { 
            font-size: 26px; 
            font-weight: 900;
            color: var(--text); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header h1 span {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .radar-pulse {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 var(--accent-glow);
            animation: radar-ping 1.8s infinite cubic-bezier(0.25, 0, 0, 1);
        }

        @keyframes radar-ping {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .action-card {
            background: var(--card);
            border-radius: 20px; padding: 20px;
            border: 1px solid #1f2937;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        button {
            background: var(--accent);
            border: none; color: #000;
            font-weight: 800; border-radius: 14px; padding: 16px;
            cursor: pointer; transition: 0.15s ease-in-out; 
            text-transform: uppercase;
            width: 100%; font-size: 15px; letter-spacing: 1px;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        button:active { transform: scale(0.98); background: #059669; }

        .auto-toggle {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #1f2937;
            font-size: 13px; font-weight: bold; color: var(--text-muted);
        }

        .switch {
            position: relative; display: inline-block; width: 50px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #374151; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        .sport-group {
            margin-bottom: 25px;
            width: 100%;
        }

        .sport-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .sport-header.soccer { color: var(--soccer-color); }
        .sport-header.basketball { color: var(--basket-color); }
        .sport-header.handball { color: var(--handball-color); }

        .match-card {
            background: var(--card);
            border-radius: 20px; padding: 20px;
            margin-bottom: 15px; 
            border: 1px solid #1f2937;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .match-meta {
            display: flex; justify-content: space-between; 
            font-size: 12px; color: var(--text-muted);
            font-weight: 700; text-transform: uppercase;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 10px;
        }

        .live-badge {
            color: var(--accent);
            display: flex; align-items: center; gap: 6px;
        }

        .match-teams {
            display: flex; justify-content: space-between; align-items: center;
            gap: 15px;
        }

        .team-name {
            font-size: 18px; font-weight: 800; color: var(--text);
            flex: 1;
        }
        .team-name.home { text-align: right; }
        .team-name.away { text-align: left; }

        .score-box {
            font-size: 24px; color: var(--text); font-weight: 900;
            background: #1f2937; padding: 8px 16px; border-radius: 12px;
            min-width: 60px; text-align: center;
            border: 1px solid #374151;
        }

        .alert-box {
            background: rgba(16, 185, 129, 0.1); 
            color: #34d399;
            padding: 12px 16px; border-radius: 12px; 
            font-size: 13px; font-weight: 700; 
            text-align: center; 
            border: 1px solid rgba(16, 185, 129, 0.2);
            line-height: 1.4;
        }

        .info-box {
            background: rgba(55, 65, 81, 0.3);
            color: var(--text-muted);
            padding: 10px 14px; border-radius: 12px;
            font-size: 12px; font-weight: 600;
            text-align: center;
            border: 1px solid rgba(55, 65, 81, 0.5);
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1><span class="radar-pulse"></span>Sport <span>radar</span></h1>
    </header>

    <div class="action-card">
        <button onclick="fetchAllSports()">
            Skeniraj sve terene 🔄
        </button>
        <div class="auto-toggle">
            <span>Automatsko skeniranje (na 5 min)</span>
            <label class="switch">
                <input type="checkbox" id="autoCheck" onchange="toggleAuto()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="radarMonitor">
        <div style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
            <p style="font-size: 15px; margin: 0 0 10px 0; font-weight: 600;">Satelit u pripravnosti.</p>
            <p style="font-size: 13px; margin: 0; color: #6b7280;">Svi sportovi su aktivni na tvom API profilu.</p>
        </div>
    </div>
</div>

<script {nonce}>
    const API_KEY = "f1cce1e4be71307c45a7a206e4a16495";
    let autoInterval = null;
    let knownAlerts = new Set();

    if ("Notification" in window) {
        Notification.requestPermission();
    }

    function playRadarSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(1600, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(900, audioCtx.currentTime + 0.35);

            gainNode.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.35);
        } catch (e) {
            console.log("Audio blokiran.");
        }
    }

    function sendNotification(title, body, matchId) {
        if (knownAlerts.has(matchId)) return;
        knownAlerts.add(matchId);

        playRadarSound();

        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(title, {
                    body: body,
                    icon: "https://cdn-icons-png.flaticon.com/512/2619/2619245.png",
                    vibrate: [400, 100, 400],
                    badge: "https://cdn-icons-png.flaticon.com/512/2619/2619245.png"
                });
            });
        }
    }

    function toggleAuto() {
        const isChecked = document.getElementById('autoCheck').checked;
        if (isChecked) {
            fetchAllSports();
            autoInterval = setInterval(fetchAllSports, 300000);
        } else {
            clearInterval(autoInterval);
        }
    }

    async function fetchFromAPI(endpoint, host) {
        const response = await fetch(`https://${host}/${endpoint}`, {
            method: 'GET',
            headers: {
                'x-rapidapi-host': host,
                'x-rapidapi-key': API_KEY
            }
        });
        const data = await response.json();
        return data.response || [];
    }

    async function fetchAllSports() {
        const monitor = document.getElementById('radarMonitor');
        if (!document.getElementById('autoCheck').checked) {
            monitor.innerHTML = '<p style="text-align: center; color: var(--accent); font-weight: 700; padding: 40px 0;">Skeniram satelitske podatke za sve sportove...</p>';
        }

        let soccerData = [];
        let basketData = [];
        let handballData = [];

        try {
            soccerData = await fetchFromAPI('fixtures?live=all', 'v3.football.api-sports.io');
        } catch (e) {
            console.error("Fudbal API Offline:", e);
        }

        try {
            basketData = await fetchFromAPI('games?live=all', 'v1.basketball.api-sports.io');
        } catch (e) {
            console.error("Košarka API Offline:", e);
        }

        try {
            handballData = await fetchFromAPI('games?live=all', 'v1.handball.api-sports.io');
        } catch (e) {
            console.error("Rukomet API Offline:", e);
        }

        renderAllResults(soccerData, basketData, handballData);
    }

    function renderAllResults(soccer, basketball, handball) {
        const monitor = document.getElementById('radarMonitor');
        monitor.innerHTML = '';
        let totalElementsAdded = 0;

        // 1. FUDBAL SEKCIJA
        const soccerElements = analyzeSoccer(soccer);
        if (soccerElements.length > 0) {
            totalElementsAdded += soccerElements.length;
            const group = createSportGroup("Fudbal Radar", "soccer", "⚽");
            soccerElements.forEach(card => group.appendChild(card));
            monitor.appendChild(group);
        }

        // 2. KOŠARKA SEKCIJA
        const basketElements = analyzeBasketball(basketball);
        if (basketElements.length > 0) {
            totalElementsAdded += basketElements.length;
            const group = createSportGroup("Košarka Radar", "basketball", "🏀");
            basketElements.forEach(card => group.appendChild(card));
            monitor.appendChild(group);
        }

        // 3. RUKOMET SEKCIJA
        const handballElements = analyzeHandball(handball);
        if (handballElements.length > 0) {
            totalElementsAdded += handballElements.length;
            const group = createSportGroup("Rukomet Radar", "handball", "🤾");
            handballElements.forEach(card => group.appendChild(card));
            monitor.appendChild(group);
        }

        if (totalElementsAdded === 0) {
            monitor.innerHTML = `
                <div style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
                    <p style="font-size: 15px; margin: 0 0 10px 0; font-weight: 600;">Skeniranje uspešno.</p>
                    <p style="font-size: 13px; margin: 0; color: #6b7280;">Nema trenutno aktivnih utakmica na mreži.</p>
                </div>
            `;
        }
    }

    function createSportGroup(title, className, emoji) {
        const div = document.createElement('div');
        div.className = 'sport-group';
        div.innerHTML = `
            <div class="sport-header ${className}">
                <span>${emoji}</span> ${title}
            </div>
        `;
        return div;
    }

    function analyzeSoccer(fixtures) {
        const elements = [];
        fixtures.forEach(match => {
            const matchId = "soc_" + match.fixture.id;
            const homeTeam = match.teams.home.name;
            const awayTeam = match.teams.away.name;
            const homeScore = match.goals.home;
            const awayScore = match.goals.away;
            const elapsed = match.fixture.status.elapsed;
            const league = match.league.name;

            let isAlert = false;
            let alertReason = "";

            if (elapsed >= 45 && elapsed <= 65 && awayScore > homeScore) {
                isAlert = true;
                alertReason = "🔥 LIVE VALUE: Favorit gubi! Kvote na preokret i golove rastu.";
            }
            else if (elapsed >= 75 && elapsed <= 85 && homeScore === 0 && awayScore === 0) {
                isAlert = true;
                alertReason = "⏰ FINIŠ DRAMA: Meč je na 0:0 u " + elapsed + "'. minutu. Traži se kasni gol!";
            }
            else if (elapsed >= 50 && elapsed <= 75 && homeScore === 1 && awayScore === 1) {
                isAlert = true;
                alertReason = "⚡ RESET KVOTE: 1:1 na terenu! Favorit juri vraćanje vođstva.";
            }

            if (isAlert) {
                elements.push(createMatchCard(league, elapsed + "'", homeTeam, awayTeam, `${homeScore}:${awayScore}`, alertReason, true));
                sendNotification("Sport radar Signal!", `${homeTeam} - ${awayTeam} (${elapsed}'). ${alertReason}`, matchId);
            } else {
                elements.push(createMatchCard(league, elapsed + "'", homeTeam, awayTeam, `${homeScore}:${awayScore}`, "Pratimo situaciju...", false));
            }
        });
        return elements;
    }

    function analyzeBasketball(games) {
        const elements = [];
        games.forEach(game => {
            const gameId = "bask_" + game.id;
            const homeTeam = game.teams.home.name;
            const awayTeam = game.teams.away.name;
            const homeScore = game.scores.home.total || 0;
            const awayScore = game.scores.away.total || 0;
            const status = game.status.short; 
            const league = game.league.name;

            // Dohvatanje poena po četvrtinama
            const q1Home = game.scores.home.quarter_1 || 0;
            const q1Away = game.scores.away.quarter_1 || 0;
            const q2Home = game.scores.home.quarter_2 || 0;
            const q2Away = game.scores.away.quarter_2 || 0;
            const q3Home = game.scores.home.quarter_3 || 0;
            const q3Away = game.scores.away.quarter_3 || 0;

            let isAlert = false;
            let alertReason = "";

            // LOGIKA A: Favorit gubi na poluvremenu (HT / Q3)
            if ((status === "HT" || status === "Q3") && homeScore !== awayScore) {
                isAlert = true;
                alertReason = "🏀 POLUVREME ALARM: Favorit gubi na poluvremenu! Očekuje se snažan pritisak u nastavku.";
            }
            // LOGIKA B: Favorit je izgubio neku od četvrtina sa dvocifrenom razlikom (kontra-trend)
            else {
                const diffQ1 = Math.abs(q1Home - q1Away);
                const diffQ2 = Math.abs(q2Home - q2Away);
                const diffQ3 = Math.abs(q3Home - q3Away);

                if (diffQ1 >= 10 && status === "Q2") {
                    isAlert = true;
                    alertReason = "🔥 KONTRA-TREND: Favorit je izgubio prvu četvrtinu sa " + diffQ1 + " razlike! Traži se odgovor.";
                } else if (diffQ2 >= 10 && status === "Q3") {
                    isAlert = true;
                    alertReason = "🔥 KONTRA-TREND: Favorit je izgubio drugu četvrtinu sa " + diffQ2 + " razlike! Traži se odgovor.";
                } else if (diffQ3 >= 10 && status === "Q4") {
                    isAlert = true;
                    alertReason = "🔥 KONTRA-TREND: Favorit je izgubio treću četvrtinu sa " + diffQ3 + " razlike! Traži se odgovor.";
                }
            }

            if (isAlert) {
                elements.push(createMatchCard(league, status, homeTeam, awayTeam, `${homeScore}:${awayScore}`, alertReason, true));
                sendNotification("Košarka Radar Signal!", `${homeTeam} - ${awayTeam} (${status}). ${alertReason}`, gameId);
            } else {
                elements.push(createMatchCard(league, status, homeTeam, awayTeam, `${homeScore}:${awayScore}`, "Pratimo kretanje rezultata...", false));
            }
        });
        return elements;
    }

    function analyzeHandball(games) {
        const elements = [];
        games.forEach(game => {
            const gameId = "hand_" + game.id;
            const homeTeam = game.teams.home.name;
            const awayTeam = game.teams.away.name;
            const homeScore = game.scores.home || 0;
            const awayScore = game.scores.away || 0;
            const elapsed = game.status.short; 
            const league = game.league.name;
            const totalGoals = homeScore + awayScore;

            let isAlert = false;
            let alertReason = "";

            if (elapsed === "SH2" && awayScore > homeScore) {
                isAlert = true;
                alertReason = "🤾 NEOČEKIVANO: Gost vodi u drugom poluvremenu! Očekuje se odgovor.";
            }
            else if (elapsed === "HT" && (totalGoals <= 18 || totalGoals >= 35)) {
                isAlert = true;
                alertReason = "📊 POLUVREME ANOMALIJA: Postignuto je " + totalGoals + " golova! Granica za golove se pomera.";
            }

            if (isAlert) {
                elements.push(createMatchCard(league, "Uživo", homeTeam, awayTeam, `${homeScore}:${awayScore}`, alertReason, true));
                sendNotification("Rukomet Radar Signal!", `${homeTeam} - ${awayTeam}. ${alertReason}`, gameId);
            } else {
                elements.push(createMatchCard(league, "Uživo", homeTeam, awayTeam, `${homeScore}:${awayScore}`, "Pratimo golove...", false));
            }
        });
        return elements;
    }

    function createMatchCard(league, meta, home, away, score, text, isAlert) {
        const card = document.createElement('div');
        card.className = 'match-card';
        
        const bottomBox = isAlert 
            ? `<div class="alert-box">${text}</div>` 
            : `<div class="info-box">${text}</div>`;

        card.innerHTML = `
            <div class="match-meta">
                <span>🏆 ${league}</span>
                <span class="live-badge"><span class="radar-pulse"></span>${meta}</span>
            </div>
            <div class="match-teams">
                <span class="team-name home">${home}</span>
                <span class="score-box">${score}</span>
                <span class="team-name away">${away}</span>
            </div>
            ${bottomBox}
        `;
        return card;
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
