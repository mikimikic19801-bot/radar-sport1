<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fudbal Radar</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#030712">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        :root {
            --bg: #030712;
            --card: #111827;
            --accent: #10b981; 
            --accent-glow: rgba(16, 185, 129, 0.2);
            --drop: #ef4444; 
            --text: #f9fafb;
            --text-muted: #9ca3af;
            --soccer-color: #3b82f6;
            --basket-color: #f97316;
            --handball-color: #a855f7;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 440px; }

        header { 
            text-align: center; 
            margin-top: 10px;
            margin-bottom: 25px; 
        }
        
        header h1 { 
            font-size: 26px; 
            font-weight: 900;
            color: var(--text); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        header h1 span {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .radar-pulse {
            width: 12px; height: 12px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 0 0 var(--accent-glow);
            animation: radar-ping 1.8s infinite cubic-bezier(0.25, 0, 0, 1);
        }

        @keyframes radar-ping {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .action-card {
            background: var(--card);
            border-radius: 20px; padding: 20px;
            border: 1px solid #1f2937;
            margin-bottom: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        button {
            background: var(--accent);
            border: none; color: #000;
            font-weight: 800; border-radius: 14px; padding: 16px;
            cursor: pointer; transition: 0.15s ease-in-out; 
            text-transform: uppercase;
            width: 100%; font-size: 15px; letter-spacing: 1px;
            box-shadow: 0 4px 14px var(--accent-glow);
        }
        button:active { transform: scale(0.98); background: #059669; }

        .auto-toggle {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 15px; padding-top: 15px; border-top: 1px solid #1f2937;
            font-size: 13px; font-weight: bold; color: var(--text-muted);
        }

        .switch {
            position: relative; display: inline-block; width: 50px; height: 26px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #374151; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(24px); }

        .sport-group {
            margin-bottom: 25px;
            width: 100%;
        }

        .sport-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
            padding-left: 5px;
        }

        .sport-header.soccer { color: var(--soccer-color); }
        .sport-header.basketball { color: var(--basket-color); }
        .sport-header.handball { color: var(--handball-color); }

        .match-card {
            background: var(--card);
            border-radius: 20px; padding: 20px;
            margin-bottom: 15px; 
            border: 1px solid #1f2937;
            display: flex; flex-direction: column; gap: 15px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        .match-meta {
            display: flex; justify-content: space-between; 
            font-size: 12px; color: var(--text-muted);
            font-weight: 700; text-transform: uppercase;
            border-bottom: 1px solid #1f2937;
            padding-bottom: 10px;
        }

        .live-badge {
            color: var(--accent);
            display: flex; align-items: center; gap: 6px;
        }

        .match-teams {
            display: flex; justify-content: space-between; align-items: center;
            gap: 15px;
        }

        .team-name {
            font-size: 18px; font-weight: 800; color: var(--text);
            flex: 1;
        }
        .team-name.home { text-align: right; }
        .team-name.away { text-align: left; }

        .score-box {
            font-size: 24px; color: var(--text); font-weight: 900;
            background: #1f2937; padding: 8px 16px; border-radius: 12px;
            min-width: 60px; text-align: center;
            border: 1px solid #374151;
        }

        .alert-box {
            background: rgba(239, 68, 68, 0.1); 
            color: #f87171;
            padding: 12px 16px; border-radius: 12px; 
            font-size: 13px; font-weight: 700; 
            text-align: center; 
            border: 1px solid rgba(239, 68, 68, 0.2);
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1><span class="radar-pulse"></span>FUDBAL <span>RADAR</span></h1>
    </header>

    <div class="action-card">
        <button onclick="fetchAllSports()">
            Skeniraj sve terene 🔄
        </button>
        <div class="auto-toggle">
            <span>Automatsko skeniranje (na 5 min)</span>
            <label class="switch">
                <input type="checkbox" id="autoCheck" onchange="toggleAuto()">
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div id="radarMonitor">
        <div style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
            <p style="font-size: 15px; margin: 0 0 10px 0; font-weight: 600;">Satelit u pripravnosti.</p>
            <p style="font-size: 13px; margin: 0; color: #6b7280;">Svi sportovi su povezani na tvoj API ključ.</p>
        </div>
    </div>
</div>

<script>
    const API_KEY = "f1cce1e4be71307c45a7a206e4a16495";
    let autoInterval = null;
    let knownAlerts = new Set();

    if ("Notification" in window) {
        Notification.requestPermission();
    }

    function playRadarSound() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.4);

            gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.4);
        } catch (e) {
            console.log("Audio blokiran.");
        }
    }

    function sendNotification(title, body, matchId) {
        if (knownAlerts.has(matchId)) return;
        knownAlerts.add(matchId);

        playRadarSound();

        if (Notification.permission === "granted") {
            navigator.serviceWorker.ready.then(reg => {
                reg.showNotification(title, {
                    body: body,
                    icon: "https://cdn-icons-png.flaticon.com/512/2619/2619245.png",
                    vibrate: [500, 100, 500],
                    badge: "https://cdn-icons-png.flaticon.com/512/2619/2619245.png"
                });
            });
        }
    }

    function toggleAuto() {
        const isChecked = document.getElementById('autoCheck').checked;
        if (isChecked) {
            fetchAllSports();
            autoInterval = setInterval(fetchAllSports, 300000);
        } else {
            clearInterval(autoInterval);
        }
    }

    async function fetchFromAPI(endpoint, host) {
        const response = await fetch(`https://${host}/${endpoint}`, {
            method: 'GET',
            headers: {
                'x-rapidapi-host': host,
                'x-rapidapi-key': API_KEY
            }
        });
        const data = await response.json();
        return data.response || [];
    }

    async function fetchAllSports() {
        const monitor = document.getElementById('radarMonitor');
        if (!document.getElementById('autoCheck').checked) {
            monitor.innerHTML = '<p style="text-align: center; color: var(--accent); font-weight: 700; padding: 40px 0;">Skeniram satelitske podatke za sve sportove...</p>';
        }

        // Svaki zahtev ide u odvojeni try-catch kako neuspeh jednog ne bi srušio celu aplikaciju
        let soccerData = [];
        let basketData = [];
        let handballData = [];

        try {
            soccerData = await fetchFromAPI('fixtures?live=all', 'v3.football.api-sports.io');
        } catch (e) {
            console.error("Greška pri učitavanju fudbala:", e);
        }

        try {
            basketData = await fetchFromAPI('games?live=all', 'v1.basketball.api-sports.io');
        } catch (e) {
            console.error("Greška pri učitavanju košarke:", e);
        }

        try {
            handballData = await fetchFromAPI('games?live=all', 'v1.handball.api-sports.io');
        } catch (e) {
            console.error("Greška pri učitavanju rukometa:", e);
        }

        renderAllResults(soccerData, basketData, handballData);
    }

    function renderAllResults(soccer, basketball, handball) {
        const monitor = document.getElementById('radarMonitor');
        monitor.innerHTML = '';
        let totalAlerts = 0;

        // 1. FUDBAL SEKCIJA
        const soccerAlerts = analyzeSoccer(soccer);
        if (soccerAlerts.length > 0) {
            totalAlerts += soccerAlerts.length;
            const group = createSportGroup("Fudbal Radar", "soccer", "⚽");
            soccerAlerts.forEach(card => group.appendChild(card));
            monitor.appendChild(group);
        }

        // 2. KOŠARKA SEKCIJA
        const basketAlerts = analyzeBasketball(basketball);
        if (basketAlerts.length > 0) {
            totalAlerts += basketAlerts.length;
            const group = createSportGroup("Košarka Radar", "basketball", "🏀");
            basketAlerts.forEach(card => group.appendChild(card));
            monitor.appendChild(group);
        }

        // 3. RUKOMET SEKCIJA
        const handballAlerts = analyzeHandball(handball);
        if (handballAlerts.length > 0) {
            totalAlerts += handballAlerts.length;
            const group = createSportGroup("Rukomet Radar", "handball", "🤾");
            handballAlerts.forEach(card => group.appendChild(card));
            monitor.appendChild(group);
        }

        if (totalAlerts === 0) {
            monitor.innerHTML = `
                <div style="text-align: center; color: var(--text-muted); padding: 40px 20px;">
                    <p style="font-size: 15px; margin: 0 0 10px 0; font-weight: 600;">Skeniranje završeno.</p>
                    <p style="font-size: 13px; margin: 0; color: #6b7280;">Nema trenutno aktivnih signala koji zadovoljavaju algoritme.</p>
                </div>
            `;
        }
    }

    function createSportGroup(title, className, emoji) {
        const div = document.createElement('div');
        div.className = 'sport-group';
        div.innerHTML = `
            <div class="sport-header ${className}">
                <span>${emoji}</span> ${title}
            </div>
        `;
        return div;
    }

    function analyzeSoccer(fixtures) {
        const cards = [];
        fixtures.forEach(match => {
            const matchId = "soc_" + match.fixture.id;
            const homeTeam = match.teams.home.name;
            const awayTeam = match.teams.away.name;
            const homeScore = match.goals.home;
            const awayScore = match.goals.away;
            const elapsed = match.fixture.status.elapsed;
            const league = match.league.name;

            let isAlert = false;
            let alertReason = "";

            if (elapsed >= 45 && elapsed <= 65 && awayScore > homeScore) {
                isAlert = true;
                alertReason = "🔥 LIVE VALUE: Domaći favorit gubi na poluvremenu! Očekuje se pritisak.";
            }
            if (elapsed >= 80 && homeScore === awayScore) {
                isAlert = true;
                alertReason = "⚡ FINIŠ ALARM: Nerešeno u finišu meča! Velika šansa za kasni gol.";
            }

            if (isAlert) {
                cards.push(createMatchCard(league, elapsed, homeTeam, awayTeam, `${homeScore}:${awayScore}`, alertReason));
                sendNotification("Fudbal Radar Signal!", `${homeTeam} - ${awayTeam} (${elapsed}'). ${alertReason}`, matchId);
            }
        });
        return cards;
    }

    function analyzeBasketball(games) {
        const cards = [];
        games.forEach(game => {
            const gameId = "bask_" + game.id;
            const homeTeam = game.teams.home.name;
            const awayTeam = game.teams.away.name;
            const homeScore = game.scores.home.total || 0;
            const awayScore = game.scores.away.total || 0;
            const quarter = game.status.short; 
            const league = game.league.name;

            let isAlert = false;
            let alertReason = "";

            if (quarter === "Q4" && Math.abs(homeScore - awayScore) <= 3) {
                isAlert = true;
                alertReason = "🏀 KOŠARKA LIVE: Drama u finišu meča! Razlika je samo 3 ili manje poena.";
            }

            if (isAlert) {
                cards.push(createMatchCard(league, quarter, homeTeam, awayTeam, `${homeScore}:${awayScore}`, alertReason));
                sendNotification("Košarka Radar Signal!", `${homeTeam} - ${awayTeam} (${quarter}). ${alertReason}`, gameId);
            }
        });
        return cards;
    }

    function analyzeHandball(games) {
        const cards = [];
        games.forEach(game => {
            const gameId = "hand_" + game.id;
            const homeTeam = game.teams.home.name;
            const awayTeam = game.teams.away.name;
            const homeScore = game.scores.home || 0;
            const awayScore = game.scores.away || 0;
            const elapsed = game.status.short; 
            const league = game.league.name;

            let isAlert = false;
            let alertReason = "";

            if (elapsed === "SH2" && awayScore > homeScore) {
                isAlert = true;
                alertReason = "🤾 RUKOMET LIVE: Gost vodi u drugom poluvremenu! Očekuje se reakcija domaćina.";
            }

            if (isAlert) {
                cards.push(createMatchCard(league, "Uživo", homeTeam, awayTeam, `${homeScore}:${awayScore}`, alertReason));
                sendNotification("Rukomet Radar Signal!", `${homeTeam} - ${awayTeam}. ${alertReason}`, gameId);
            }
        });
        return cards;
    }

    function createMatchCard(league, meta, home, away, score, alertText) {
        const card = document.createElement('div');
        card.className = 'match-card';
        card.innerHTML = `
            <div class="match-meta">
                <span>🏆 ${league}</span>
                <span class="live-badge"><span class="radar-pulse"></span>${meta}</span>
            </div>
            <div class="match-teams">
                <span class="team-name home">${home}</span>
                <span class="score-box">${score}</span>
                <span class="team-name away">${away}</span>
            </div>
            <div class="alert-box">${alertText}</div>
        `;
        return card;
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
